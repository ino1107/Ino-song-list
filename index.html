<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊諾 Ino Song List</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        /* 自定義捲軸樣式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #F9F8FF;
        }
        ::-webkit-scrollbar-thumb {
            background: #D5CFE5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9B8BBF;
        }
        /* 移除 Select 預設外觀 */
        select {
            appearance: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body class="bg-[#F9F8FF]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /**
         * 修復版圖示組件
         * 解決 icon.toSvg is not a function 的報錯
         */
        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);

            useEffect(() => {
                if (window.lucide && ref.current) {
                    const iconKey = name.charAt(0).toLowerCase() + name.slice(1);
                    const iconData = window.lucide.icons[iconKey] || window.lucide.icons[name];
                    
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svg.setAttribute("width", size);
                        svg.setAttribute("height", size);
                        svg.setAttribute("viewBox", "0 0 24 24");
                        svg.setAttribute("fill", "none");
                        svg.setAttribute("stroke", "currentColor");
                        svg.setAttribute("stroke-width", "2");
                        svg.setAttribute("stroke-linecap", "round");
                        svg.setAttribute("stroke-linejoin", "round");
                        if (className) {
                            className.split(' ').forEach(cls => {
                                if (cls) svg.classList.add(cls);
                            });
                        }

                        iconData.forEach(([tag, attrs]) => {
                            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);
                            Object.entries(attrs).forEach(([key, value]) => {
                                element.setAttribute(key, value);
                            });
                            svg.appendChild(element);
                        });

                        ref.current.innerHTML = '';
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);

            return <span ref={ref} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        const App = () => {
            // --- Google Sheet CSV 連結 (用於抓取資料) ---
            const SHEET_DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT30owrni1cunvHWpCIaI4E9mHjZhaGAi4goh1mo13vx0E5dgV7uPWDDYCwRBASNmItf2W25-sPMMYX/pub?output=csv"; 
            
            // --- Google Sheet 編輯連結 (用於導覽) ---
            const SHEET_VIEW_URL = "https://docs.google.com/spreadsheets/d/1jbM81kyHfpiCo8FC7IT-69N0lBvok_iYLdKNbJRd3OI/edit?usp=sharing";

            const [songs, setSongs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedGenre, setSelectedGenre] = useState('全部');
            const [sortConfig, setSortConfig] = useState({ key: 'title', direction: 'asc' });
            
            const [currentPage, setCurrentPage] = useState(1);
            const songsPerPage = 20;

            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, selectedGenre]);

            const parseCSV = (text) => {
                const rows = [];
                let currentRow = [];
                let currentField = '';
                let insideQuotes = false;
                
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const nextChar = text[i + 1];
                    
                    if (char === '"' && insideQuotes && nextChar === '"') {
                        currentField += '"'; i++;
                    } else if (char === '"') {
                        insideQuotes = !insideQuotes;
                    } else if (char === ',' && !insideQuotes) {
                        currentRow.push(currentField);
                        currentField = '';
                    } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                        if (currentRow.length > 0 || currentField !== '') {
                            currentRow.push(currentField);
                            rows.push(currentRow);
                            currentRow = [];
                            currentField = '';
                        }
                        if (char === '\r' && nextChar === '\n') i++;
                    } else {
                        currentField += char;
                    }
                }
                if (currentRow.length > 0 || currentField !== '') {
                    currentRow.push(currentField);
                    rows.push(currentRow);
                }
                return rows;
            };

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        const response = await fetch(SHEET_DATA_URL);
                        const csvText = await response.text();
                        
                        const allRows = parseCSV(csvText);
                        if (allRows.length < 2) throw new Error("資料格式不正確");

                        const rawHeaders = allRows[0];
                        const dataRows = allRows.slice(1);

                        const parsedData = dataRows.map((row, index) => {
                            const item = {};
                            rawHeaders.forEach((header, i) => {
                                const val = row[i] ? row[i].trim() : "-";
                                const h = header.replace(/\n/g, ' ').trim();
                                
                                if (h.includes("曲名")) item.title = val;
                                else if (h.includes("歌手") || h.includes("アーチスト")) item.artist = val;
                                else if (h.includes("類型") || h.includes("ジャンル")) item.genre = val;
                                else if (h.includes("作品種類") || h.includes("種類")) item.type = val;
                                else if (h.includes("作品系列") || h.includes("系列")) item.series = val;
                            });
                            item.id = index;
                            return item;
                        }).filter(item => item.title && item.title !== "-");

                        setSongs(parsedData);
                        setLoading(false);
                    } catch (err) {
                        console.error("Fetch error:", err);
                        setError("讀取失敗。請確認試算表已「發佈到網路」並檢查網路連線。");
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const genres = useMemo(() => {
                const list = songs.map(s => s.genre).filter(g => g && g !== "-");
                return ['全部', ...new Set(list)];
            }, [songs]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const processedSongs = useMemo(() => {
                let result = songs.filter(song => {
                    const searchStr = `${song.title} ${song.artist} ${song.series} ${song.type}`.toLowerCase();
                    const matchesSearch = searchStr.includes(searchTerm.toLowerCase());
                    const matchesGenre = selectedGenre === '全部' || song.genre === selectedGenre;
                    return matchesSearch && matchesGenre;
                });

                result.sort((a, b) => {
                    const valA = a[sortConfig.key] || "";
                    const valB = b[sortConfig.key] || "";
                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });

                return result;
            }, [songs, searchTerm, selectedGenre, sortConfig]);

            const totalPages = Math.ceil(processedSongs.length / songsPerPage);
            const currentSongs = useMemo(() => {
                const startIndex = (currentPage - 1) * songsPerPage;
                return processedSongs.slice(startIndex, startIndex + songsPerPage);
            }, [processedSongs, currentPage]);

            return (
                <div className="min-h-screen text-[#7C6BA1] p-4 md:p-12">
                    {/* Header Area */}
                    <header className="max-w-7xl mx-auto mb-16 flex flex-col items-center">
                        <h1 className="text-3xl font-light tracking-[0.4em] text-[#6B5B95] mb-6 text-center uppercase">
                            伊諾 Ino Song List
                        </h1>
                        
                        <div className="flex flex-wrap justify-center items-center gap-x-8 gap-y-3 text-[#A99ACD]">
                            {/* YouTube 頻道連結 */}
                            <div className="flex items-center space-x-3">
                                <div className="h-px w-6 bg-[#ECE7F5]"></div>
                                <a 
                                    href="https://www.youtube.com/@Inochannel" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="flex items-center space-x-1.5 text-[11px] tracking-[0.2em] font-medium uppercase text-[#9B8BBF] hover:text-[#6B5B95] transition-colors group"
                                >
                                    <span>Ino - YouTube</span>
                                    <Icon name="ExternalLink" size={12} className="group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" />
                                </a>
                                <div className="h-px w-6 bg-[#ECE7F5]"></div>
                            </div>

                            {/* Google Sheet 連結 */}
                            <div className="flex items-center space-x-3">
                                <div className="h-px w-6 bg-[#ECE7F5]"></div>
                                <a 
                                    href={SHEET_VIEW_URL}
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="flex items-center space-x-1.5 text-[11px] tracking-[0.2em] font-medium uppercase text-[#9B8BBF] hover:text-[#6B5B95] transition-colors group"
                                >
                                    <span>INO完整歌單及歌回VOD</span>
                                    <Icon name="Table" size={12} className="group-hover:translate-x-0.5 transition-transform" />
                                </a>
                                <div className="h-px w-6 bg-[#ECE7F5]"></div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto">
                        <div className="flex flex-col md:flex-row gap-3 mb-10 items-stretch">
                            <div className="flex-grow relative group">
                                <span className="absolute left-5 top-1/2 -translate-y-1/2 text-[#C8BFE0] group-focus-within:text-[#9B8BBF] transition-colors">
                                    <Icon name="Search" size={18} />
                                </span>
                                <input
                                    type="text"
                                    placeholder="搜尋曲名、歌手、系列或種類..."
                                    className="w-full pl-14 pr-6 py-4 bg-white border border-[#EDE9F5] rounded-2xl focus:outline-none focus:ring-4 focus:ring-[#9B8BBF]/10 transition-all text-[#6B5B95] placeholder-[#D5CFE5] shadow-sm shadow-[#9B8BBF]/5"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    disabled={loading}
                                />
                            </div>
                            
                            <div className="relative md:w-56 group text-[#7C6BA1]">
                                <span className="absolute left-5 top-1/2 -translate-y-1/2 text-[#C8BFE0] group-focus-within:text-[#9B8BBF] pointer-events-none">
                                    <Icon name="Filter" size={16} />
                                </span>
                                <select
                                    className="w-full pl-12 pr-10 py-4 bg-white border border-[#EDE9F5] rounded-2xl focus:outline-none focus:ring-4 focus:ring-[#9B8BBF]/10 transition-all text-[#7C6BA1] shadow-sm appearance-none cursor-pointer"
                                    value={selectedGenre}
                                    onChange={(e) => setSelectedGenre(e.target.value)}
                                    disabled={loading}
                                >
                                    {genres.map(genre => (
                                        <option key={genre} value={genre}>
                                            {genre === '全部' ? '所有類型' : genre}
                                        </option>
                                    ))}
                                </select>
                                <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[#C8BFE0] pointer-events-none">
                                    <Icon name="ChevronDown" size={18} />
                                </div>
                            </div>
                        </div>

                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-32 space-y-4">
                                <Icon name="Loader2" size={40} className="animate-spin text-[#9B8BBF]" />
                                <p className="text-sm tracking-widest text-[#9B8BBF] animate-pulse">正在讀取雲端資料...</p>
                            </div>
                        ) : error ? (
                            <div className="bg-white border border-[#F1ECF7] p-12 rounded-[2.5rem] text-center shadow-sm">
                                <Icon name="Info" size={40} className="mx-auto mb-4 text-[#D5CFE5]" />
                                <p className="text-[#9B8BBF] font-light">{error}</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-[#F1ECF7] overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full border-collapse text-left min-w-[850px]">
                                            <thead>
                                                <tr className="bg-[#FBF9FF] text-[#9B8BBF] text-[11px] uppercase tracking-widest border-b border-[#F1ECF7]">
                                                    <th className="pl-10 pr-6 py-6 font-semibold cursor-pointer hover:text-[#6B5B95]" onClick={() => handleSort('title')}>
                                                        <div className="flex items-center space-x-2">
                                                            <span>曲名</span>
                                                            {sortConfig.key === 'title' && (sortConfig.direction === 'asc' ? <Icon name="ChevronUp" size={14} /> : <Icon name="ChevronDown" size={14} />)}
                                                        </div>
                                                    </th>
                                                    <th className="px-6 py-6 font-semibold cursor-pointer hover:text-[#6B5B95]" onClick={() => handleSort('artist')}>
                                                        <div className="flex items-center space-x-2">
                                                            <span>歌手</span>
                                                            {sortConfig.key === 'artist' && (sortConfig.direction === 'asc' ? <Icon name="ChevronUp" size={14} /> : <Icon name="ChevronDown" size={14} />)}
                                                        </div>
                                                    </th>
                                                    <th className="px-6 py-6 font-semibold text-center whitespace-nowrap">類型</th>
                                                    <th className="px-6 py-6 font-semibold text-center whitespace-nowrap">種類</th>
                                                    <th className="pr-10 pl-6 py-6 font-semibold">作品系列</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-[#F1ECF7]/70">
                                                {currentSongs.length > 0 ? (
                                                    currentSongs.map((song) => (
                                                        <tr key={song.id} className="hover:bg-[#F9F8FF] transition-colors group text-sm md:text-base">
                                                            <td className="pl-10 pr-6 py-6 font-medium text-[#6B5B95] tracking-tight group-hover:text-[#56497D]">
                                                                {song.title}
                                                            </td>
                                                            <td className="px-6 py-6 text-sm text-[#9B8BBF] font-light">
                                                                {song.artist}
                                                            </td>
                                                            <td className="px-6 py-6 text-center whitespace-nowrap">
                                                                <span className="inline-block px-3 py-1 bg-[#F5F1FA] text-[#8C7CAF] text-[10px] rounded-lg border border-[#E9E1F2] whitespace-nowrap uppercase">
                                                                    {song.genre}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-6 text-center text-[11px] font-medium tracking-wider text-[#9B8BBF] whitespace-nowrap">
                                                                {song.type === '-' ? <span className="text-[#E0D9F0]">N/A</span> : song.type}
                                                            </td>
                                                            <td className="pr-10 pl-6 py-6">
                                                                <div className="flex items-center space-x-2">
                                                                    <div className={`w-1 h-1 rounded-full ${song.series === '-' ? 'bg-[#F1ECF7]' : 'bg-[#C8BFE0]'}`}></div>
                                                                    <span className={`text-xs ${song.series === '-' ? 'text-[#C8BFE0] italic' : 'text-[#8C7CAF] font-light'}`}>
                                                                        {song.series === '-' ? '無系列資訊' : song.series}
                                                                    </span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))
                                                ) : (
                                                    <tr>
                                                        <td colSpan="5" className="px-8 py-32 text-center text-[#D5CFE5]">
                                                            <Icon name="ListMusic" size={40} className="mx-auto mb-4 opacity-50" />
                                                            <p className="text-xs tracking-[0.2em] uppercase">查無相關歌曲</p>
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {totalPages > 1 && (
                                    <div className="flex items-center justify-center space-x-4 py-4">
                                        <button
                                            onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))}
                                            disabled={currentPage === 1}
                                            className="p-2 rounded-xl bg-white border border-[#EDE9F5] text-[#C8BFE0] hover:text-[#9B8BBF] hover:border-[#B7AAD6] disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-sm"
                                        >
                                            <Icon name="ChevronLeft" size={20} />
                                        </button>
                                        
                                        <div className="flex items-center px-4 py-2 bg-white rounded-xl border border-[#EDE9F5] shadow-sm">
                                            <span className="text-xs tracking-widest text-[#9B8BBF]">
                                                第 <span className="font-semibold text-[#6B5B95]">{currentPage}</span> / {totalPages} 頁
                                            </span>
                                        </div>

                                        <button
                                            onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))}
                                            disabled={currentPage === totalPages}
                                            className="p-2 rounded-xl bg-white border border-[#EDE9F5] text-[#C8BFE0] hover:text-[#9B8BBF] hover:border-[#B7AAD6] disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-sm"
                                        >
                                            <Icon name="ChevronRight" size={20} />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        <footer className="mt-12 flex flex-col md:flex-row items-center justify-between gap-6 px-6 pb-16">
                            <div className="flex items-center space-x-3 group">
                                <div className="p-2 bg-white rounded-xl border border-[#EDE9F5] shadow-sm group-hover:bg-[#F9F8FF] transition-colors">
                                    <Icon name="Info" size={14} className="text-[#C8BFE0]" />
                                </div>
                                <p className="text-xs text-[#9B8BBF] tracking-wide font-light">
                                    目前共篩選出 <span className="text-[#6B5B95] font-semibold">{processedSongs.length}</span> 首曲目
                                </p>
                            </div>
                            <div className="flex items-center space-x-6">
                                <div className="flex space-x-1.5">
                                    <div className="w-1 h-1 bg-[#ECE7F5] rounded-full"></div>
                                    <div className="w-1 h-1 bg-[#C8BFE0] rounded-full"></div>
                                    <div className="w-1 h-1 bg-[#9B8BBF] rounded-full"></div>
                                </div>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
